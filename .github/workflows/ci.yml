name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'
    - name: Install dependencies
      run: npm ci
    - name: Run Linter
      run: npm run lint
    - name: Run Tests
      run: npm run test

  deploy:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
    - name: Deploying app... 
      run: |
        echo 'Deploying...'
        sleep 10
        echo 'App successfully deployed!'
